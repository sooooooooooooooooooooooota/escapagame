<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>シンプル脱出ゲーム</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game">
    <div class="header">
      <span id="room-title">Room Escape #01</span>
      <span style="float: right;" class="badge">
        <span class="badge-dot"></span> HTML / JS
      </span>
    </div>

    <div class="room">
      <div class="door" id="door" title="ドア"></div>

      <div class="desk" id="desk" title="机">
        <div class="desk-top"></div>
        <div class="desk-leg left"></div>
        <div class="desk-leg right"></div>
      </div>

      <button class="paper" id="paper" type="button" title="紙">
        <img src="paper.png" alt="紙" class="paper-image" />
      </button>

      <button class="box" id="box" type="button" title="宝箱">
        <img src="takarabako.png" alt="宝箱" class="box-image" />
      </button>

      <div class="poster" id="poster" title="ポスター">
        「机の上の<br />箱が怪しい…」
      </div>
    </div>

    <div class="ui">
      <div>
        <div class="log">
          <div class="log-main" id="log-main">
            ここは見知らぬ部屋だ。ドアは固く閉ざされている。
          </div>
          <div class="log-sub" id="log-sub">
            気になる場所をクリックして調べてみよう。
          </div>
        </div>
        <div class="btn-row">
          <button id="btn-reset">最初からやり直す</button>
        </div>
      </div>

      <div class="inventory">
        <div class="inventory-title">INVENTORY</div>
        <div class="inventory-items" id="inventory"></div>
      </div>
    </div>
  </div>

  <!-- Box クリック時の画像モーダル -->
  <div class="modal hidden" id="image-modal">
    <div class="modal-backdrop" data-modal-close="image-modal"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span>紙のメモ</span>
        <button class="modal-close" data-modal-close="image-modal">×</button>
      </div>
      <div class="modal-body">
        <img
          src="puzzle.png"
          alt="紙のメモ"
          class="modal-image"
        />
      </div>
    </div>
  </div>

  <!-- 鍵を入手したときの画像モーダル -->
  <div class="modal hidden" id="key-modal">
    <div class="modal-backdrop" data-modal-close="key-modal"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span>鍵を手に入れた</span>
        <button class="modal-close" data-modal-close="key-modal">×</button>
      </div>
      <div class="modal-body">
        <img
          src="key.png"
          alt="鍵"
          class="modal-image"
        />
      </div>
    </div>
  </div>

  <!-- ドアクリック時の答え入力モーダル -->
  <div class="modal hidden" id="answer-modal">
    <div class="modal-backdrop" data-modal-close="answer-modal"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span>答えを入力</span>
        <button class="modal-close" data-modal-close="answer-modal">×</button>
      </div>
      <div class="modal-body">
        <p class="modal-text">
          箱の画像から導かれる答えを入力してください。
        </p>
        <div class="dial-row" id="dial-row" aria-label="答えのダイヤル">
          <div class="dial">
            <button type="button" class="dial-btn" data-dial-index="0" data-dial-delta="-1">▲</button>
            <div class="dial-value" id="dial-value-0">?</div>
            <button type="button" class="dial-btn" data-dial-index="0" data-dial-delta="1">▼</button>
          </div>
          <div class="dial">
            <button type="button" class="dial-btn" data-dial-index="1" data-dial-delta="-1">▲</button>
            <div class="dial-value" id="dial-value-1">?</div>
            <button type="button" class="dial-btn" data-dial-index="1" data-dial-delta="1">▼</button>
          </div>
          <div class="dial">
            <button type="button" class="dial-btn" data-dial-index="2" data-dial-delta="-1">▲</button>
            <div class="dial-value" id="dial-value-2">?</div>
            <button type="button" class="dial-btn" data-dial-index="2" data-dial-delta="1">▼</button>
          </div>
        </div>
        <div class="dial-preview">
          選択中: <span id="dial-preview-text">???</span>
        </div>
        <div class="modal-actions">
          <button id="btn-answer-cancel" class="secondary">キャンセル</button>
          <button id="btn-answer-ok">決定</button>
        </div>
      </div>
    </div>
  </div>

  <!-- クリア時のモーダル -->
  <div class="modal hidden" id="clear-modal">
    <div class="modal-backdrop" data-modal-close="clear-modal"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span>Stage 1 Clear</span>
        <button class="modal-close" data-modal-close="clear-modal">×</button>
      </div>
      <div class="modal-body">
        <p class="modal-text">
          正しい答えを入力し、ドアの鍵が外れた！<br />
          次のステージへ進みますか？
        </p>
        <div class="modal-actions">
          <button id="btn-next-stage">次のステージへ</button>
        </div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
